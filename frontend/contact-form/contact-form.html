<div id="contactModal" class="contact-modal">

    <div class="contact-modal-content">

        <div class="contact-modal-header">

            <h2>Get in Touch</h2>

            <button class="contact-close-btn">
                ✕
            </button>

        </div>

        <form id="contactForm">

            <div class="form-group">
                <label>Name</label>

                <input
                    type="text"
                    id="contactName"
                    placeholder="Your name"
                    required
                >
            </div>

            <div class="form-group">
                <label>Email</label>

                <input
                    type="email"
                    id="contactEmail"
                    placeholder="your@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label>Subject</label>

                <input
                    type="text"
                    id="contactSubject"
                    placeholder="Subject"
                    required
                >
            </div>

            <div class="form-group">
                <label>Message</label>

                <textarea
                    id="contactMessage"
                    rows="6"
                    placeholder="Tell me about your project..."
                    required
                ></textarea>
            </div>

            <button
                type="submit"
                class="send-btn"
            >
                Send Message
            </button>

        </form>

    </div>

</div>
