<div id="contactModal" class="contact-modal">

    <div class="contact-modal-content">

        <div class="contact-modal-header">

            <h2>Get in Touch</h2>

            <button class="contact-close-btn">
                ✕
            </button>

        </div>

        
        <form id="contactForm">

            <div class="form-layout">

                <div class="form-left">
                
                    <div class="form-group">
                        <label>Name</label>
                    
                        <input
                            type="text"
                            id="contactName"
                            name="name"
                            placeholder="Your name"
                            required
                        >
                    </div>
                
                    <div class="form-group">
                        <label>Email</label>
                    
                        <input
                            type="email"
                            id="contactEmail"
                            name="email"
                            placeholder="your@email.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Subject</label>
                    
                        <input
                            type="text"
                            id="contactSubject"
                            name="subject"
                            placeholder="What's this about?"
                            required
                        >
                    </div>
                
                </div>

                <div class="form-right">

                    <div class="form-group">
                        <label>Message</label>
                    
                        <textarea
                            id="contactMessage"
                            name="message"
                            rows="6"
                            placeholder="Tell me more..."
                            required
                        ></textarea>
                    </div>
                </div>
            </div>

            <button
                type="submit"
                class="send-btn"
            >
                Send Message
            </button>

        </form>

    </div>

</div>

<div id="toast" class="toast">

    <div class="toast-icon"></div>

    <div class="toast-content">

        <div id="toastTitle" class="toast-title"></div>

        <div id="toastMessage" class="toast-message"></div>

    </div>

</div>
