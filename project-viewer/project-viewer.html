<div id="projectModal" class="project-modal">

    <div class="project-window">

        <button id="closeProject" class="close-button">

            ✕

        </button>
        <div class="project-title" style="margin-top:0px;">
            <h2 id="projectTitle" style="margin-top:0px;"></h2>
        </div>

        <div class="project-left">

            <div class="carousel">
                <img
                    id="carouselImage"
                    src=""
                    alt=""
                >
            </div>

            <div
                id="carouselDots"
                class="carousel-dots"
            ></div>

            <a
                id="githubButton"
                target="_blank"
                class="github-button"
            >

                <img src="img/github.svg" alt="GitHub Icon"  class="social-icon">
                View on GitHub

            </a>

        </div>

        <div class="project-right">

            <div
                id="projectDescription"
                class="project-description"
            ></div>
            <h2>Tech stack:</h2>
            <div
                id="projectTags"
                class="project-tags"
            ></div>

        </div>

    </div>

</div>
